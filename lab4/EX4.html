<!DOCTYPE html>
<html>
<head>
    <title>AJAX Weather Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
            margin-top: 80px;
            color: #333;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 220px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }

        #spinner {
            margin-top: 20px;
            display: none;
            font-weight: bold;
        }

        #result {
            margin-top: 25px;
            font-size: 18px;
            background: white;
            display: inline-block;
            padding: 20px;
            border-radius: 10px;
            min-width: 250px;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>

<h2>🌦 Weather Information Dashboard</h2>

<input type="text" id="cityInput" placeholder="Enter city name">
<button onclick="getWeather()">Get Weather</button>

<div id="spinner">Loading weather data...</div>
<div id="result"></div>

<script>
    // Cache variables
    let lastSearchedCity = "";
    let cachedData = null;

    function getWeather() {

        const city = document.getElementById("cityInput").value.trim();
        const resultDiv = document.getElementById("result");
        const spinner = document.getElementById("spinner");

        if (city === "") {
            resultDiv.innerHTML = "<p class='error'>Please enter a city name.</p>";
            return;
        }

        // Check cache
        if (city.toLowerCase() === lastSearchedCity.toLowerCase() && cachedData) {
            displayWeather(cachedData);
            return;
        }

        spinner.style.display = "block";
        resultDiv.innerHTML = "";

        // 🔑 Replace with your actual API key
        const apiKey = "43bfd525f7af1ba9781a1aa14aef2556";

        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

        const xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);

        xhr.onload = function () {

            spinner.style.display = "none";

            if (xhr.status === 200) {

                const data = JSON.parse(xhr.responseText);

                // If API returns error inside JSON
                if (data.cod !== 200) {
                    resultDiv.innerHTML = "<p class='error'>City not found!</p>";
                    return;
                }

                // Save to cache
                lastSearchedCity = city;
                cachedData = data;

                displayWeather(data);

            } else {
                resultDiv.innerHTML = "<p class='error'>Error fetching data.</p>";
            }
        };

        xhr.onerror = function () {
            spinner.style.display = "none";
            resultDiv.innerHTML = "<p class='error'>Network error occurred.</p>";
        };

        xhr.send();
    }

    function displayWeather(data) {

        const resultDiv = document.getElementById("result");

        const temperature = data.main.temp;
        const humidity = data.main.humidity;
        const condition = data.weather[0].description;
        const cityName = data.name;
        const country = data.sys.country;

        resultDiv.innerHTML = `
            <h3>${cityName}, ${country}</h3>
            <p><strong>Temperature:</strong> ${temperature} °C</p>
            <p><strong>Humidity:</strong> ${humidity}%</p>
            <p><strong>Condition:</strong> ${condition}</p>
        `;
    }
</script>

</body>
</html>
