<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Marks Calculator</title>
  <style>
    :root {
      --primary: #5e60ce;
      --primary-dark: #4d4fc2;
      --accent: #48cae4;
      --bg: #f0f4f8;
      --card: rgba(255, 255, 255, 0.85);
      --text: #1d3557;
      --text-light: #457b9d;
      --border: rgba(255, 255, 255, 0.4);
      --shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      color: var(--text);
    }

    .calculator {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .calculator:hover {
      transform: translateY(-5px);
    }

    .header {
      background: linear-gradient(to right, var(--primary), #5390d9);
      color: white;
      padding: 1.8rem 2rem;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .content {
      padding: 2rem 1.8rem;
    }

    .field {
      margin-bottom: 1.6rem;
    }

    label {
      display: block;
      margin-bottom: 0.6rem;
      font-weight: 600;
      color: var(--text-light);
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 0.95rem 1.2rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 0.8rem;
      font-size: 1.05rem;
      background: rgba(255,255,255,0.6);
      transition: all 0.25s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(94, 96, 206, 0.18);
      background: white;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.8rem;
    }

    button {
      flex: 1;
      padding: 1rem;
      border: none;
      border-radius: 0.8rem;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-calculate {
      background: var(--primary);
      color: white;
    }

    .btn-calculate:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-reset {
      background: #e63946;
      color: white;
    }

    .btn-reset:hover {
      background: #d00000;
      transform: translateY(-2px);
    }

    #result {
      margin-top: 2rem;
      padding: 1.6rem;
      background: rgba(255,255,255,0.7);
      border-radius: 1rem;
      text-align: center;
      display: none;
      opacity: 0;
      transform: translateY(15px);
      transition: all 0.4s ease;
    }

    #result.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .result-title {
      font-size: 1.2rem;
      color: var(--text-light);
      margin-bottom: 1rem;
    }

    .result-value {
      font-size: 1.45rem;
      font-weight: 700;
      margin: 0.9rem 0;
      color: var(--primary);
    }

    .result-value.accent {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="header">Student Marks Calculator</div>

    <div class="content">
      <div class="field">
        <label>Student Name</label>
        <input type="text" id="studentName" placeholder="Enter name" required>
      </div>

      <div class="field">
        <label>Mark 1</label>
        <input type="number" id="mark1" min="0" max="100" placeholder="0 – 100" required>
      </div>

      <div class="field">
        <label>Mark 2</label>
        <input type="number" id="mark2" min="0" max="100" placeholder="0 – 100" required>
      </div>

      <div class="field">
        <label>Mark 3</label>
        <input type="number" id="mark3" min="0" max="100" placeholder="0 – 100" required>
      </div>

      <div class="buttons">
        <button class="btn-calculate" onclick="calculateMarks()">Calculate</button>
        <button class="btn-reset" onclick="resetForm()">Reset</button>
      </div>

      <div id="result">
        <div class="result-title">Results</div>
        <div class="result-value" id="nameOutput"></div>
        <div class="result-value">Total Marks: <span id="totalOutput"></span></div>
        <div class="result-value accent">Average: <span id="avgOutput"></span></div>
      </div>
    </div>
  </div>

  <script>
    // ES6 arrow function
    const calculateAverage = (m1, m2, m3) => (m1 + m2 + m3) / 3;

    function calculateMarks() {
      const name = document.getElementById('studentName').value.trim() || "Student";
      const m1 = Number(document.getElementById('mark1').value) || 0;
      const m2 = Number(document.getElementById('mark2').value) || 0;
      const m3 = Number(document.getElementById('mark3').value) || 0;

      const total = m1 + m2 + m3;
      const avg = calculateAverage(m1, m2, m3);

      document.getElementById('nameOutput').textContent = name;
      document.getElementById('totalOutput').textContent = total;
      document.getElementById('avgOutput').textContent = avg.toFixed(2);

      const resultDiv = document.getElementById('result');
      resultDiv.classList.add('show');
    }

    function resetForm() {
      document.getElementById('studentName').value = '';
      document.getElementById('mark1').value = '';
      document.getElementById('mark2').value = '';
      document.getElementById('mark3').value = '';
      document.getElementById('result').classList.remove('show');
    }
  </script>

</body>
</html>
